name: "\U0001F41B Bug Report"
description: Report a problem with the Forgebook site
labels: ["bug"]
body:
  - type: input
    id: url
    attributes:
      label: Page URL
      description: Which page has the issue?
      placeholder: "https://microsoft-foundry.github.io/forgebook/notebook/..."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshots
      description: Drag and drop any screenshots here.
    validations:
      required: false
