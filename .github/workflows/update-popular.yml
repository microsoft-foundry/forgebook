name: Update Popular Notebooks

on:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write  # Required for OIDC federated credential

jobs:
  fetch-popular:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install script dependencies
        working-directory: ./scripts
        run: npm ci

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch popular notebooks from App Insights
        working-directory: ./scripts
        env:
          APP_INSIGHTS_RESOURCE_ID: ${{ vars.APP_INSIGHTS_RESOURCE_ID }}
        run: npx tsx fetch-popular.ts

      - name: Create pull request for updated popular data
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: site/src/data/popular.json
          branch: chore/update-popular-notebooks
          delete-branch: true
          commit-message: "chore: update popular notebooks data"
          title: "chore: update popular notebooks data"
          body: |
            Automated update of `site/src/data/popular.json` from Application Insights click data.

            This PR is opened by the scheduled Update Popular Notebooks workflow so `main` can remain protected.
