name: Preview PR

on:
  pull_request:
    branches: [main]

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install, build site
        uses: withastro/action@v5
        with:
          path: ./site

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-preview-${{ github.event.pull_request.number }}
          path: ./site/dist
          retention-days: 7

      - name: Comment PR with preview info
        uses: actions/github-script@v7
        with:
          script: |
            const message = `## 🔍 Site Preview

            The site has been built successfully for this PR.

            **Artifact:** \`site-preview-${{ github.event.pull_request.number }}\`

            You can download the built site from the Actions artifacts to preview locally.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
