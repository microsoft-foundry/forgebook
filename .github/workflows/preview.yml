name: Preview PR

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

concurrency:
  group: "preview-pr-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

jobs:
  # --- Build, validate, and deploy preview ---
  build-and-preview:
    if: ${{ github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: ./site
        run: npm ci

      - name: Install script dependencies
        working-directory: ./scripts
        run: npm ci

      - name: Validate registry
        working-directory: ./scripts
        run: npx tsx validate-registry.ts

      - name: Build site for preview
        working-directory: ./site
        env:
          ASTRO_BASE: /forgebook/preview/pr-${{ github.event.pull_request.number }}
        run: npm run build

      - name: Install Playwright browser
        working-directory: ./site
        run: npx playwright install --with-deps chromium

      - name: Run accessibility checks
        working-directory: ./site
        env:
          ASTRO_BASE: /forgebook/preview/pr-${{ github.event.pull_request.number }}
          PLAYWRIGHT_BASE_URL: http://localhost:4321/forgebook/preview/pr-${{ github.event.pull_request.number }}
          FORGEBOOK_TEST_BASE_PATH: /forgebook/preview/pr-${{ github.event.pull_request.number }}
        run: npm run test:a11y

      - name: Deploy preview to GitHub Pages subdirectory
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./site/dist
          target-folder: preview/pr-${{ github.event.pull_request.number }}
          clean: true

      - name: Comment PR with preview URL
        uses: actions/github-script@v9
        with:
          script: |
            const previewUrl = `https://microsoft-foundry.github.io/forgebook/preview/pr-${{ github.event.pull_request.number }}/`;
            const body = `## 🔍 Preview\n\nA live preview of this PR is available at:\n**${previewUrl}**`;

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('## 🔍 Preview'));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # --- Clean up preview on PR close ---
  cleanup-preview:
    if: ${{ github.event.action == 'closed' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          PR_DIR="preview/pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            git rm -rf "$PR_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Remove preview for PR #${{ github.event.pull_request.number }}"
            git push origin gh-pages
          fi
