# yaml-language-server: $schema=./.github/authors_schema.json

# Author metadata for the site.
# Keys must match the GitHub username used in registry.yaml.
#
# Required fields:
#   - name: Display name for the author
#   - title: Author title or role
#
# Optional fields:
#   - avatar: URL to avatar image (defaults to GitHub avatar)
#   - githubUrl: GitHub profile URL (defaults to github.com/<username>)
#   - linkedinUrl: LinkedIn profile URL
#   - xUrl: X (Twitter) profile URL

nicholasdbrady:
  name: "Nick Brady"
  title: "Senior Program Manager"
  avatar: "https://github.com/nicholasdbrady.png?size=200"
  githubUrl: "https://github.com/nicholasdbrady"
  linkedinUrl: "https://www.linkedin.com/in/nicholasdbrady"
  xUrl: "https://x.com/nicholasdbrady"

anihitk07:
  name: "Anirban Ganguly"
  title: "Contributor"
  avatar: "https://github.com/anihitk07.png?size=200"
  githubUrl: "https://github.com/anihitk07"
  linkedinUrl: "https://www.linkedin.com/in/anirban-ganguly-uk/"

