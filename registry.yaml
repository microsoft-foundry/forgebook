# yaml-language-server: $schema=./.github/registry_schema.json

# Registry of notebooks to publish on the site.
# Each entry maps a notebook to its metadata for the website.
#
# Required fields:
#   - slug: URL-safe identifier (used in site URLs)
#   - path: Path to the notebook file relative to repo root
#   - title: Display title for the notebook
#   - authors: List of author GitHub usernames
#
# Optional fields:
#   - description: Short description for previews
#   - date: Publication date (YYYY-MM-DD)
#   - tags: List of topic tags

- slug: foundry-agent-part-1
  path: notebooks/foundry-agent-part-1.ipynb
  title: "Create Your First Agent (Part 1)"
  description: "Step-by-step tutorial to deploy gpt-5-mini on Microsoft Foundry, create an AI agent with Web Search, and test it — all from the Foundry portal. Part 1 of 4."
  date: "2026-05-15"
  authors:
    - github: nicholasdbrady
  tags:
    - agents

